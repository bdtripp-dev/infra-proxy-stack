on:
  # workflow_dispatch: # Allows manual trigger from the UI
  workflow_call: # Still allows calling from other workflows
jobs:
  deploy-dev-or-prod:
    # needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Determine Deployment Target
        run: |
          # Get the Short SHA
            SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
            REPO_NAME="${{ github.event.repository.name }}"
            ROOT_DOMAIN=bdtripp.com
          # Determine environment
          if [[ "${{ github.ref }}" == "refs/heads/master" ]]; then
            ENV_NAME="prod"
            TARGET_HOST="${{ secrets.PROD_HOST }}"
            TARGET_USER="${{ secrets.VPS_PROD_USERNAME }}"
            SUBDOMAIN="${REPO_NAME}"
          else
            ENV_NAME="dev"
            TARGET_HOST="${{ secrets.DEV_HOST }}"
            TARGET_USER="${{ secrets.VPS_DEV_USERNAME }}"
            SUBDOMAIN="${ENV_NAME}-${REPO_NAME}"
          fi
          # Determine FQDN
          if [[ "${REPO_NAME}" == "portfolio" ]]; then
            FQDN="${ENV_NAME}.${ROOT_DOMAIN}"
            [[ "${ENV_NAME}" == "prod" ]] && FQDN="${ROOT_DOMAIN}"
          else
            FQDN="${SUBDOMAIN}.${ROOT_DOMAIN}"
          fi
          # Export everything to GitHub env
          {
            echo "TAG=${ENV_NAME}-${SHORT_SHA}"
            echo "ENV_NAME=${ENV_NAME}"
            echo "REPO_NAME=${REPO_NAME}"
            echo "FQDN=${FQDN}"
            echo "TARGET_HOST=${TARGET_HOST}"
            echo "TARGET_USER=${TARGET_USER}"
          } >> "$GITHUB_ENV"
      - name: Set Project Name and Paths
        run: |
          echo "PROJECT_NAME=${{ env.ENV_NAME }}-${{ env.REPO_NAME }}" >> $GITHUB_ENV
          echo "REPO_PATH=/srv/projects/${{ env.REPO_NAME }}" >> $GITHUB_ENV
          echo "BRANCH_PATH=/srv/projects/${{ env.REPO_NAME }}/${{ env.ENV_NAME }}" >> $GITHUB_ENV
      - name: Create directory structure via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.TARGET_HOST }}
          username: ${{ env.TARGET_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: 65002
          # Pass the GitHub Env variables into the remote script
          envs: REPO_PATH, BRANCH_PATH, TARGET_USER
          script: |
            set -e
            echo "Ensuring directory exists: $REPO_PATH"
            mkdir -p "$REPO_PATH"
            echo "Ensuring directory exists: $BRANCH_PATH"
            mkdir -p "$BRANCH_PATH"
            chown -R "$TARGET_USER":"$TARGET_USER" "$BRANCH_PATH"
            chmod 700 "$BRANCH_PATH" 
      - name: Copy docker-compose.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          # Dynamically set based on the branch
          host: ${{ env.TARGET_HOST }}
          username: ${{ env.TARGET_USER }}
          # Static because you use the same key for both
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: 65002
          source: "docker-compose.yaml"
          target: "${{ env.BRANCH_PATH }}/"
          # strip_components: 0 # Places the file directly in the target folder
      - name: Deploy via SSH - pull images and compose up
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.TARGET_HOST }}
          username: ${{ env.TARGET_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: 65002
          # Pass the GitHub Env variables into the remote script
          envs: ENV_NAME,FQDN,TAG,PROJECT_NAME,REPO_NAME,BRANCH_PATH
          script: |
            # This comment is here to fix indentation error
              set -e  # Stop script on first error
              echo "Deploying $PROJECT_NAME to $ENV_NAME environment…"
              echo "for $REPO_NAME using $FQDN and $TAG"
            # Pull and Up
              cd "$BRANCH_PATH"
              for i in {1..5}; do
                echo "Attempt $i to pull:"
                if docker compose -p ${PROJECT_NAME} pull; then
                  echo "Pull succeeded"
                  break;
                elif [ $i -eq 5 ]; then
                  echo "All 5 attempts have failed. Exiting."
                  exit 1;
                else
                  echo "Pull failed, retrying in 10 seconds..."
                  sleep 10
                fi
              done
              docker compose -p ${PROJECT_NAME} up -d
            # CLEANUP: Remove old images to save disk space
              echo "Cleaning up old Docker images..."
              docker image prune -af --filter "until=72h" 